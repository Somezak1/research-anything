name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install pytest
      - run: python -m pytest
      - run: python -m py_compile scripts/*.py
      - name: Check optional Workflow harness syntax
        run: >-
          node -e 'const fs=require("fs");
          const AF=Object.getPrototypeOf(async function(){}).constructor;
          const source=fs.readFileSync("scripts/workflow.js","utf8")
          .replace(/^export\s+const\s+meta/m,"const meta");
          new AF("args","agent","parallel","log",source);'
      - name: Test optional Workflow harness contract
        run: node --test scripts/test_workflow.js
